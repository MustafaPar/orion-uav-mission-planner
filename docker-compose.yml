version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uav-postgres
    environment:
      POSTGRES_DB: uav_fleet_db
      POSTGRES_USER: uav_admin
      POSTGRES_PASSWORD: uav_password
    ports:
      - "5432:5432"
    volumes:
      - uav_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uav_admin -d uav_fleet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: uav-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: uav_fleet_db
      DB_USER: uav_admin
      DB_PASSWORD: uav_password
      JWT_SECRET: change-this-super-secret-key-in-production-minimum-256-bits
    ports:
      - "8080:8080"

volumes:
  uav_pg_data:
